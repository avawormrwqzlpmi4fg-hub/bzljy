<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Connection...</title>
    
    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '1012507727939374'); 
    fbq('track', 'PageView');

    <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=1012507727939374&ev=PageView&noscript=1"
    /></noscript>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #05070a;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(0, 255, 102, 0.2);
            border-top: 4px solid #00ff66;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 25px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 { font-size: 20px; font-weight: 500; margin-bottom: 10px; letter-spacing: 0.5px; }
        p { font-size: 14px; color: #8b9bb4; margin-bottom: 30px; }
        
        /* 兜底按钮回归原生的 a 标签，使用 CSS 做成按钮样子 */
        #fallback-btn {
            display: none;
            background-color: #00ff66;
            color: #000;
            padding: 12px 24px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 15px;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
        }
        #fallback-btn:hover { background-color: #33ff85; }
    </style>
</head>
<body>

    <div class="spinner"></div>
    <h2 id="status-title">Connecting to Support...</h2>
    <p id="status-desc">Please wait while we assign a specialist for you.</p>
    
    <a href="#" id="fallback-btn" target="_top">Click here if not redirected</a>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            
            // 1. 配置区域
            const whatsappPool = [
                "60162926498", 
                "60167057443", 
                "60106608613"
            ];
            const defaultMsg = "你好，很高兴认识你";
            const CACHE_DURATION = 30 * 24 * 60 * 60 * 1000; 

            // 2. Base64 隐身字典
            const webBase = atob("aHR0cHM6Ly93YS5tZS8="); // https://wa.me/
            const intentBase = atob("aW50ZW50Oi8vc2VuZD9waG9uZT0="); // intent://send?phone=

            // 3. 分配与缓存逻辑
            const now = new Date().getTime();
            let selectedPhone = null;
            const cachedDataStr = localStorage.getItem('support_route_target');
            
            if (cachedDataStr) {
                try {
                    const parsed = JSON.parse(cachedDataStr);
                    if (now - parsed.timestamp < CACHE_DURATION) {
                        selectedPhone = parsed.target;
                    }
                } catch (err) {}
            }

            if (!selectedPhone) {
                selectedPhone = whatsappPool[Math.floor(Math.random() * whatsappPool.length)];
                localStorage.setItem('support_route_target', JSON.stringify({ target: selectedPhone, timestamp: now }));
            }

            // 4. 设备识别与终极底层协议组装
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            const isAndroid = /Android/i.test(userAgent);
            const encodedText = encodeURIComponent(defaultMsg);
            let finalUrl = "";

            if (isAndroid) {
                // 安卓设备：使用 intent 协议强行呼叫系统层
                finalUrl = intentBase + selectedPhone + "&text=" + encodedText + "#Intent;scheme=whatsapp;package=com.whatsapp;end";
            } else {
                // iOS / PC 设备：使用 wa.me 配合 target="_top" 突破
                finalUrl = webBase + selectedPhone + "?text=" + encodedText;
            }

            // 5. 专门针对 Facebook 爬虫的判断
            const isFBBot = /facebookexternalhit|Facebot/i.test(userAgent);

            // 6. 核心突破逻辑：只有当不是爬虫时，才执行真实动作
            if (!isFBBot) {
                // 战术 1：偷偷给兜底按钮换上真正的突围链接
                document.getElementById('fallback-btn').href = finalUrl;

                // 战术 2：延迟后执行“顶层”强制自动跳转
                setTimeout(function() {
                    try {
                        // 使用 top.location 尝试撕开内置浏览器的 iframe 限制
                        window.top.location.href = finalUrl;
                    } catch (e) {
                        window.location.href = finalUrl;
                    }
                }, 1500);
            }

            // 7. 防失联机制：3.5 秒后显示原生突围按钮
            setTimeout(function() {
                document.getElementById('fallback-btn').style.display = 'inline-block';
                document.querySelector('.spinner').style.display = 'none';
                document.getElementById('status-title').innerText = 'Ready to Connect';
                document.getElementById('status-desc').innerText = 'Please click the button below to start the chat.';
            }, 3500);

        });
    </script>
</body>
</html>
