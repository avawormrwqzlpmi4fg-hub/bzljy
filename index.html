<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Connection...</title>
    
    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',

    <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=1012507727939374&ev=PageView&noscript=1"
    /></noscript>
    
    <style>
        /* 极简暗黑科技风 - 视觉缓冲，安抚用户等待的 1.5 秒 */
        body {
            margin: 0;
            padding: 0;
            background-color: #05070a;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(0, 255, 102, 0.2);
            border-top: 4px solid #00ff66;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 25px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h2 { font-size: 20px; font-weight: 500; margin-bottom: 10px; letter-spacing: 0.5px; }
        p { font-size: 14px; color: #8b9bb4; margin-bottom: 30px; }

        /* 兜底按钮默认隐藏 */
        #fallback-btn {
            display: none;
            background-color: #00ff66;
            color: #000;
            padding: 12px 24px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 15px;
            transition: all 0.3s;
        }
        #fallback-btn:hover { background-color: #33ff85; }
    </style>
</head>
<body>

    <div class="spinner" id="spinner"></div>
    <h2 id="status-title">正在安全跳转...</h2>
    <p id="status-desc">系统正在为您分配专属客服，请稍候。</p>
    
    <a href="https://w.suurl.com/s/GdD24N1au" id="fallback-btn">如果未自动跳转，请点击这里</a>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            
            // 1. 定义你的目标分流链接
            const targetUrl = "https://w.suurl.com/s/GdD24N1au";
            
            // 2. 爬虫防御：直接拦截 FB 机器人
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            const isFBBot = /facebookexternalhit|Facebot|bot|spider|crawler/i.test(userAgent);

            // 如果是爬虫，代码到此结束，它只会看到一个转圈的纯净网页
            if (isFBBot) return; 

            // 3. 核心突围逻辑：延迟 1.5 秒后全自动跳转
            // 这 1.5 秒是为了确保 Meta Pixel 已经成功把访客数据发回给 FB 服务器
            setTimeout(function() {
                try {
                    // 优先尝试 top.location 突破可能存在的 iframe 限制
                    window.top.location.href = targetUrl;
                } catch (e) {
                    // 降级方案
                    window.location.replace(targetUrl);
                }
            }, 1500);

            // 4. 防失联兜底机制：3.5 秒后如果页面还在（自动跳转被极个别浏览器死死拦截了）
            // 就显示手动点击按钮，把最后一步的选择权交给用户
            setTimeout(function() {
                document.getElementById('fallback-btn').style.display = 'inline-block';
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('status-title').innerText = '连接已就绪';
                document.getElementById('status-desc').innerText = '请点击下方按钮前往 WhatsApp';
            }, 3500);
            
        });
    </script>
</body>
</html>
