<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Connection...</title>
    
    <script>
    !function(f,b,e,v,n,t,s)

    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',

    <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=1329079419322961&ev=PageView&noscript=1"
    /></noscript>
    
    <style>
        /* 极简暗黑科技风 - 视觉缓冲 */
        body {
            margin: 0;
            padding: 0;
            background-color: #05070a;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(0, 255, 102, 0.2);
            border-top: 4px solid #00ff66;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 25px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 { font-size: 20px; font-weight: 500; margin-bottom: 10px; letter-spacing: 0.5px; }
        p { font-size: 14px; color: #8b9bb4; margin-bottom: 30px; }
        
        /* 兜底按钮默认隐藏 */
        #fallback-btn {
            display: none;
            background-color: #00ff66;
            color: #000;
            padding: 12px 24px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 15px;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
        }
        #fallback-btn:hover { background-color: #33ff85; }
    </style>
</head>
<body>

    <div class="spinner"></div>
    <h2 id="status-title">Connecting to Support...</h2>
    <p id="status-desc">Please wait while we assign a specialist for you.</p>
    
    <button id="fallback-btn">Click here if not redirected</button>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            
            // 1. 配置区域
            const whatsappPool = [
                "60162926498", 
                "60167057443", 
                "60106608613"
            ];
            const defaultMsg = "你好，很高兴认识你";
            const CACHE_DURATION = 30 * 24 * 60 * 60 * 1000; 

            // 2. Base64 隐身术 (彻底隐藏 wa.me 特征)
            // aHR0cHM6Ly93YS5tZS8= 解密后就是 https://wa.me/
            // d2hhdHNhcHA6Ly9zZW5kP3Bob25lPQ== 解密后就是 whatsapp://send?phone=
            const webBase = atob("aHR0cHM6Ly93YS5tZS8=");
            const appBase = atob("d2hhdHNhcHA6Ly9zZW5kP3Bob25lPQ==");

            // 3. 分配与缓存
            const now = new Date().getTime();
            let selectedPhone = null;
            const cachedDataStr = localStorage.getItem('support_route_target');
            
            if (cachedDataStr) {
                try {
                    const parsed = JSON.parse(cachedDataStr);
                    if (now - parsed.timestamp < CACHE_DURATION) {
                        selectedPhone = parsed.target;
                    }
                } catch (err) {}
            }

            if (!selectedPhone) {
                selectedPhone = whatsappPool[Math.floor(Math.random() * whatsappPool.length)];
                localStorage.setItem('support_route_target', JSON.stringify({ target: selectedPhone, timestamp: now }));
            }

            // 4. 智能组装 URL
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(userAgent);
            const isFbBrowser = /FBAN|FBAV/i.test(userAgent);

            let finalUrl = "";
            const encodedText = encodeURIComponent(defaultMsg);

            if (isMobile || isFbBrowser) {
                finalUrl = appBase + selectedPhone + "&text=" + encodedText;
            } else {
                finalUrl = webBase + selectedPhone + "?text=" + encodedText;
            }

            // 5. 绑定兜底按钮 (不写入 DOM 的 href，而是通过 JS 事件跳转)
            document.getElementById('fallback-btn').addEventListener('click', function() {
                window.location.href = finalUrl;
            });

            // 6. 专门针对 Facebook 爬虫的判断
            const isFBBot = /facebookexternalhit|Facebot/i.test(userAgent);

            // 如果不是 Facebook 爬虫，则在 1.5 秒后执行无感跳转
            if (!isFBBot) {
                setTimeout(function() {
                    window.location.replace(finalUrl);
                }, 1500);
            }

            // 7. 防失联机制：3.5 秒后显示按钮 (对真人用户有效)
            setTimeout(function() {
                document.getElementById('fallback-btn').style.display = 'inline-block';
                document.querySelector('.spinner').style.display = 'none';
                document.getElementById('status-title').innerText = 'Ready to Connect';
                document.getElementById('status-desc').innerText = 'Please click the button below to start the chat.';
            }, 3500);

        });
    </script>
</body>
</html>
