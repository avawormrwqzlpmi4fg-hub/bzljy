    <style>
        /* 建立高信任度、现代且专业的 UI 界面，鼓励用户点击 */
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f2f5; /* 类似 Facebook 的柔和背景色 */
            color: #1c1e21;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .card {
            background-color: #ffffff;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            max-width: 90%;
            width: 340px;
        }

        /* 模拟 WhatsApp 风格的信任图标 */
        .icon-wrapper {
            width: 64px;
            height: 64px;
            background-color: #25D366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .icon-wrapper svg {
            width: 32px;
            height: 32px;
            fill: #ffffff;
        }

        h2 { font-size: 22px; font-weight: bold; margin-bottom: 12px; }
        
        p { font-size: 15px; color: #606770; margin-bottom: 30px; line-height: 1.5; }

        /* 遵循最佳实践的明显交互按钮 */
        .action-button {
            display: inline-block;
            background-color: #25D366;
            color: #ffffff;
            padding: 16px 24px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box;
            transition: background-color 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        .action-button:hover { background-color: #128C7E; }
        
        /* 防爬虫隐藏区 */
        #content-area { display: none; }
    </style>
</head>
<body>

    <div class="card" id="content-area">
        <div class="icon-wrapper">
            <svg viewBox="0 0 24 24">

            </svg>
        </div>
        <h2>分配成功！</h2>
        <p>您的专属客服已就绪。<br>请点击下方按钮，系统将安全地唤起 WhatsApp。</p>
        
        <a href="#" id="wa-link" class="action-button">前往 WhatsApp 沟通</a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            
            // 1. 爬虫防御：如果是 Facebook 爬虫，页面永远保持纯白空白，它抓不到任何链接
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            const isFBBot = /facebookexternalhit|Facebot|bot|spider|crawler/i.test(userAgent);

            if (isFBBot) {
                return; // 直接中止，不渲染界面，不执行逻辑
            }

            // 2. 真人用户放行，显示界面
            document.getElementById('content-area').style.display = 'block';

            // 3. 配置区域
            const whatsappPool = ["60162926498", "60167057443", "60106608613"];
            const defaultMsg = "你好，很高兴认识你";
            const CACHE_DURATION = 30 * 24 * 60 * 60 * 1000; 

            // 4. 分配与防撞单缓存逻辑
            const now = new Date().getTime();
            let selectedPhone = null;
            const cachedDataStr = localStorage.getItem('wa_target');
            
            if (cachedDataStr) {
                try {
                    const parsed = JSON.parse(cachedDataStr);
                    if (now - parsed.timestamp < CACHE_DURATION) {
                        selectedPhone = parsed.target;
                    }
                } catch (err) {}
            }

            if (!selectedPhone) {
                selectedPhone = whatsappPool[Math.floor(Math.random() * whatsappPool.length)];
                localStorage.setItem('wa_target', JSON.stringify({ target: selectedPhone, timestamp: now }));
            }

            // 5. 使用 Meta 官方推荐的 Universal Link 格式
            // 这里我们不再隐藏它，而是光明正大地附着在按钮上，因为我们有合规的用户交互
            const finalUrl = `https://wa.me/${selectedPhone}?text=${encodeURIComponent(defaultMsg)}`;

            // 6. 将合法的 URL 绑定到合法的 <a> 标签上
            document.getElementById('wa-link').href = finalUrl;

        });
    </script>
</body>
</html>
